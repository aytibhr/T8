<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#050510"/>
  <!-- Border glow -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#00f3ff" stroke-width="2"/>
  <!-- Number 8 in retro pixel style -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
    font-family="monospace" font-size="38" font-weight="900" fill="#ffea00"
    style="paint-order:stroke" stroke="#ff5e00" stroke-width="2">8</text>
  <!-- Neon blue corner pixels -->
  <rect x="2" y="2" width="6" height="6" fill="#00f3ff"/>
  <rect x="56" y="2" width="6" height="6" fill="#00f3ff"/>
  <rect x="2" y="56" width="6" height="6" fill="#ff00ea"/>
  <rect x="56" y="56" width="6" height="6" fill="#ff00ea"/>
</svg>
